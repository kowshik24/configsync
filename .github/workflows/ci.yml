name: Rust CI

on:
  push:
    branches: ["main"]
    tags: ["v*"]
  pull_request:
    branches: ["main"]

env:
  CARGO_TERM_COLOR: always

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-linux:
    name: Quality + Integration (Linux)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo/target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Check format
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Rust tests (all targets)
        run: cargo test --all-targets --locked

      - name: Shell integration test (isolated HOME)
        run: |
          chmod +x tests/integration_test.sh
          REAL_HOME="$HOME"
          TMP_HOME="$(mktemp -d)"
          HOME="$TMP_HOME" \
          XDG_CONFIG_HOME="$TMP_HOME/.config" \
          XDG_DATA_HOME="$TMP_HOME/.local/share" \
          CARGO_HOME="$REAL_HOME/.cargo" \
          RUSTUP_HOME="$REAL_HOME/.rustup" \
          bash tests/integration_test.sh

  cross-platform-build:
    name: Cross-platform build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build
        run: cargo build --locked --verbose

      - name: Compile-test lib/bin targets
        run: cargo test --lib --bins --locked --verbose
